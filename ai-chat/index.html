<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Practice</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 500px; margin: 3rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    #chat-log { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; height: 300px; overflow-y: auto; margin-bottom: 1rem; }
    .message { margin-bottom: 0.6rem; padding: 0.5rem 0.7rem; border-radius: 6px; }
    .message-user { background: #E8F0EA; text-align: right; }
    .message-ai { background: #f0f0f0; }
    #chat-form { display: flex; gap: 0.5rem; }
    #chat-input { flex: 1; padding: 0.5rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>AI Chat Practice</h1>

  <div id="chat-log"></div>

  <form id="chat-form">
    <label for="chat-input" class="visually-hidden">Message</label>
    <input type="text" id="chat-input" placeholder="Ask something..." autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <!-- config.js is gitignored and must be loaded BEFORE script.js -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
