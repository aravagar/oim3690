<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Arav Agarwal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Arav Agarwal</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about-me.html">About</a></li>
      <li><a href="studioforma.html">Studioforma</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <header class="page-hero">
    <span class="hero-tag">Get in touch</span>
    <h1 class="section-title">Contact</h1>
    <p class="hero-sub">
      Whether it's export partnerships, B2B collaborations, or just a
      conversation — reach out. All fields are required.
    </p>
  </header>

  <section>
    <form id="contact-form" action="https://oim.zhili.dev/echo/view" method="POST">

      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required aria-required="true" />
      </div>

      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required aria-required="true" />
      </div>

      <div>
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required aria-required="true" />
      </div>

      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="What would you like to say?" required aria-required="true"></textarea>
      </div>

      <button type="submit" class="form-submit">Submit</button>

    </form>
  </section>

  <footer>
    <p>© 2026 Arav Agarwal</p>
    <p>Delhi · Boston</p>
  </footer>

</body>
</html>
