<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 480px;
        margin: 60px auto;
        padding: 0 1.5rem;
      }

      h1 {
        font-size: 1.4rem;
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 0.3rem;
      }

      input,
      textarea {
        display: block;
        width: 100%;
        padding: 0.5rem;
        margin-bottom: 1.2rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
        font-family: sans-serif;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #555;
      }

      button {
        padding: 0.6rem 1.4rem;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover {
        background: #444;
      }
    </style>
  </head>
  <body>

    <h1>Contact</h1>

    <form action="https://oim.zhili.dev/echo/view" method="GET">

      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Submit</button>

    </form>

  </body>
</html>
