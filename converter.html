<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #6b6b65;
      margin-bottom: 32px;
    }

    .converter-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b6b65;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #c8c8c2;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: 600;
      background: #fff;
      color: #1a1a18;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus {
      outline: 2px solid #1a1a18;
      outline-offset: 1px;
      border-color: #1a1a18;
    }

    /* hide number input spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }

    .arrow {
      font-size: 1.2rem;
      color: #9e9e98;
      padding-bottom: 10px;
      flex-shrink: 0;
    }

    .reset-btn {
      margin-top: 20px;
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #6b6b65;
      border: 1px solid #c8c8c2;
      transition: background 0.15s, color 0.15s;
    }
    .reset-btn:hover { background: #e0e0db; color: #1a1a18; }

    .formula-note {
      margin-top: 32px;
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #e0e0db;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #6b6b65;
      line-height: 1.7;
    }

    .formula-note strong { color: #1a1a18; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Temperature Converter</h1>
    <p class="subtitle">Type in either field to convert instantly.</p>

    <!-- HTML form generated with AI, JS written by hand -->
    <div class="converter-row">
      <div class="field">
        <label for="celsius">Celsius (C)</label>
        <input type="number" id="celsius" placeholder="e.g. 100" step="any" />
      </div>

      <span class="arrow">&#8644;</span>

      <div class="field">
        <label for="fahrenheit">Fahrenheit (F)</label>
        <input type="number" id="fahrenheit" placeholder="e.g. 212" step="any" />
      </div>
    </div>

    <button class="reset-btn" id="reset-btn">Clear</button>

    <div class="formula-note">
      <strong>Formulas</strong><br />
      C to F: (C &times; 9/5) + 32<br />
      F to C: (F &minus; 32) &times; 5/9
    </div>
  </div>

  <script>
    // DOM references
    const celsiusInput    = document.getElementById("celsius");
    const fahrenheitInput = document.getElementById("fahrenheit");
    const resetBtn        = document.getElementById("reset-btn");

    // Convert Celsius to Fahrenheit
    // Written by hand using parseFloat as covered in class 6/24
    function toFahrenheit(celsius) {
      return celsius * 9 / 5 + 32;
    }

    // Convert Fahrenheit to Celsius
    // Added via AI enhancement for two-way conversion
    function toCelsius(fahrenheit) {
      return (fahrenheit - 32) * 5 / 9;
    }

    // When user types in Celsius field, update Fahrenheit
    celsiusInput.addEventListener("input", function () {
      const c = parseFloat(celsiusInput.value);
      if (!isNaN(c)) {
        fahrenheitInput.value = toFahrenheit(c).toFixed(2);
      } else {
        fahrenheitInput.value = "";
      }
    });

    // When user types in Fahrenheit field, update Celsius
    // Two-way enhancement added with AI after writing the one-way version by hand
    fahrenheitInput.addEventListener("input", function () {
      const f = parseFloat(fahrenheitInput.value);
      if (!isNaN(f)) {
        celsiusInput.value = toCelsius(f).toFixed(2);
      } else {
        celsiusInput.value = "";
      }
    });

    // Clear both fields
    resetBtn.addEventListener("click", function () {
      celsiusInput.value = "";
      fahrenheitInput.value = "";
      celsiusInput.focus();
    });
  </script>
</body>
</html>
