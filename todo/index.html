<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: 0.01em;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #c8c8c2;
      border-radius: 6px;
      font-size: 0.92rem;
      background: #fff;
      color: #1a1a18;
    }

    input[type="text"]:focus {
      outline: 2px solid #1a1a18;
      outline-offset: 1px;
      border-color: #1a1a18;
    }

    button {
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, color 0.15s;
    }

    .btn-primary {
      background: #1a1a18;
      color: #fff;
      border-color: #1a1a18;
    }
    .btn-primary:hover { background: #333330; }

    .btn-ghost {
      background: transparent;
      color: #6b6b65;
      border-color: #c8c8c2;
    }
    .btn-ghost:hover { background: #e0e0db; color: #1a1a18; }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: transparent;
      color: #6b6b65;
      border: 1px solid #c8c8c2;
    }
    .filter-btn:hover { background: #e0e0db; }
    .filter-btn.active {
      background: #1a1a18;
      color: #fff;
      border-color: #1a1a18;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1px solid #e0e0db;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .todo-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: #1a1a18;
    }

    .todo-text {
      flex: 1;
      font-size: 0.92rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #9e9e98;
    }

    .delete-btn {
      padding: 4px 10px;
      font-size: 0.78rem;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      color: #9e9e98;
      font-size: 0.88rem;
      padding: 32px 0;
    }

    .summary {
      font-size: 0.8rem;
      color: #9e9e98;
      margin-bottom: 12px;
    }

    .error {
      font-size: 0.8rem;
      color: #c62828;
      margin-bottom: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do</h1>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a task..." maxlength="120" />
      <button class="btn-primary" id="add-btn">Add</button>
    </div>

    <p class="error" id="error-msg"></p>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <p class="summary" id="summary"></p>

    <ul class="todo-list" id="todo-list"></ul>

    <p class="empty-state hidden" id="empty-state">Nothing here.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
